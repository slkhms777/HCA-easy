
device: "cuda"
sam2:
  model_checkpoint: "config/checkpoints/sam2/sam2.1_hiera_large.pt"
  model_config: "config/sam2_config/sam2.1_hiera_l.yaml"
mano:
  model_path: "config/mano_models"
  use_pca: true
  flat_hand_mean: false
  num_pca_comps: 45
mp_hand:
  max_num_hands: 2
  min_hand_detection_confidence: 0.08
  min_tracking_confidence: 0.45
  min_hand_presence_confidence: 0.45
  running_mode: "video"
  frame_rate: 30
  model_asset_path: "config/checkpoints/mediapipe/hand_landmarker.task"
  device: gpu
optimization:
  hand_pose_solver:
    lr: 0.001
    total_steps: 10000
    smooth_steps: 500
    w_kpt_2d: 1.0
    w_kpt_3d: 1.0
    w_reg: 0.001
    w_smooth: 0.1
    w_smooth_rot: 0.0
    w_smooth_trans: 0.0
    w_smooth_acc_rot: 1.0
    w_smooth_acc_trans: 1.0
    smooth_window_size: 1
    valid_mano_joint_indices:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 6
      - 8
      - 10
      - 12
      - 14
      - 16
      - 18
      - 20
